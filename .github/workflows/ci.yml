name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build, test, and verify example
        run: pnpm check

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        working-directory: packages/moshe-sdk-python
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: packages/moshe-sdk-python
        run: python -m pytest

      - name: Type check
        working-directory: packages/moshe-sdk-python
        run: python -m mypy src
